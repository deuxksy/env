# =====================================================================
# 1. 기본 서버/세션 설정
# =====================================================================
# 256색상 및 True Color 지원 (M4 Mac/Prompt 3 가독성 향상)
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 히스토리 용량 확장 (데브옵스 로그 확인용)
set -g history-limit 50000

# 메시지 표시 시간 (ms)
set -g display-time 2000

# 에스코프 타임 단축 (Vim 사용 시 입력 지연 방지)
set -s escape-time 0

# =====================================================================
# 2. 마우스 및 우클릭 붙여넣기 (중요!)
# =====================================================================
# 마우스 모드를 켜면 스크롤은 편하지만 우클릭 붙여넣기가 꼬일 수 있습니다.
# 사용자님의 vi 붙여넣기 습관을 위해 'off'를 추천하거나, 
# 'on' 상태에서 Shift+우클릭을 사용하는 것을 권장합니다.
set -g mouse off

# =====================================================================
# 3. 단축키 및 윈도우 관리
# =====================================================================
# Prefix를 Ctrl-a로 변경 (선택 사항: 기존 Ctrl-b가 편하시면 주석 처리)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 윈도우/패널 인덱스를 0이 아닌 1부터 시작 (숫자 키패드 접근성)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# 화면 분할 직관화 (현재 경로 유지)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim 스타일 패널 이동 (Dygma Raise 1 키보드와 찰떡궁합)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =====================================================================
# 4. 시각적 설정 (43인치 4K 모니터 최적화)
# =====================================================================
# =====================================================================
# 시각적 테마 (Visual Theme) - 4K & Retina 최적화
# =====================================================================

# 1. 상태 바 기본 설정
set -g status-position bottom       # 상태 바 위치 (top으로 변경 가능)
set -g status-style "bg=default,fg=white" # 배경 투명 (터미널 테마 유지)
set -g status-interval 5            # 업데이트 간격 (5초)

# 2. 좌측 영역 (Session Information)
# 세션 이름을 강조하고, 연결 상태를 시각화
set -g status-left-length 40
set -g status-left "#[fg=black,bg=cyan,bold] 🖥️ #S #[bg=default,fg=cyan] #[default]"

# 3. 우측 영역 (System Metrics & Clock)
# M4 Mac/Fedora 성능과 네트워크를 확인하기 위한 레이아웃
set -g status-right-length 100
set -g status-right "#[fg=yellow]󰒋 #(hostname) #[fg=white]| #[fg=green]󰻠 #[fg=white]%H:%M #[fg=cyan]󰃭 #[fg=white]%Y-%m-%d "

# 4. 윈도우 리스트 (Window Tabs)
# 현재 보고 있는 창을 명확하게 구분 (43인치 모니터에서 눈에 띄게)
setw -g window-status-format "#[fg=gray] #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold]#[bg=cyan,fg=black,bold] #I:#W #[bg=default,fg=cyan,bold]"
setw -g window-status-separator ""

# 5. 패널 경계선 (Pane Borders)
# 여러 창을 띄웠을 때 활성화된 창을 확실히 표시
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=cyan"

# 6. 메시지 스타일 (Command Line / Messages)
set -g message-style "bg=yellow,fg=black,bold"
